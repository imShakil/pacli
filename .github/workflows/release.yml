name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: "Build, Test, and Release on GitHub"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: "Set up Python"
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.13"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest build
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: "Lint with flake8"
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Run full linting (warnings only)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: "Build and Install Locally"
        run: |
          python -m build
          pip install .

      - name: "Run tests with pytest"
        run: pytest

      - name: "Upload distributions as artifact"
        uses: actions/upload-artifact@v6.0.0
        with:
          name: release-dists
          path: dist/

      - name: Create release metadata
        run: |
          # Get the previous tag to compute the commit range
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            COMMIT_RANGE="${PREV_TAG}..${{ github.ref_name }}"
            COMMIT_LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %h %s (%an)" --no-merges)
          else
            COMMIT_RANGE="(initial release)"
            COMMIT_LOG=$(git log --pretty=format:"- %h %s (%an)" --no-merges)
          fi

          cat > release.txt << EOF
          Release: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Repository: ${{ github.repository }}
          Range: ${COMMIT_RANGE}

          ## Commits
          ${COMMIT_LOG}
          EOF
          cat release.txt

      - name: "Upload release info file"
        uses: actions/upload-artifact@v6.0.0
        with:
          name: release-info
          path: release.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: release.txt
          files: |
            dist/*
            release.txt
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
